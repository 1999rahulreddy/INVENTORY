---
- name: Deploy INVENTORY
  hosts: web
  become: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install nginx
      apt:
        name: nginx
        state: present

    - name: Remove old inventory site config
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/nginx/sites-enabled/inventory
        - /etc/nginx/sites-available/inventory

    - name: Remove default nginx page
      file:
        path: /var/www/html/index.nginx-debian.html
        state: absent

    - name: Create web root
      file:
        path: /var/www/html
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"

    - name: Copy website files
      copy:
        src: ../public/
        dest: /var/www/html/
        owner: www-data
        group: www-data
        mode: preserve

    - name: Copy nginx configuration
      copy:
        src: nginx.conf
        dest: /etc/nginx/sites-available/default
        owner: root
        group: root
        mode: "0644"

    - name: Enable default site
      file:
        src: /etc/nginx/sites-available/default
        dest: /etc/nginx/sites-enabled/default
        state: link
        force: yes

    - name: Test nginx configuration
      command: nginx -t
      changed_when: false

    - name: Restart nginx
      service:
        name: nginx
        state: restarted
        enabled: yes