---
- hosts: web

  become: yes

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Upgrade packages
      apt:
        upgrade: dist

    - name: Install nginx
      apt:
        name: nginx
        state: present

    - name: Enable nginx
      service:
        name: nginx
        enabled: yes
        state: started

    - name: Remove default site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Create StockSnap directory
      file:
        path: /var/www/stocksnap
        state: directory
        mode: '0755'

    - name: Copy index.html
      copy:
        src: files/index.html
        dest: /var/www/stocksnap/index.html

    - name: Copy styles.css
      copy:
        src: files/styles.css
        dest: /var/www/stocksnap/styles.css

    - name: Copy app.js
      copy:
        src: files/app.js
        dest: /var/www/stocksnap/app.js

    - name: Copy manifest.json
      copy:
        src: files/manifest.json
        dest: /var/www/stocksnap/manifest.json

    - name: Configure nginx
      copy:
        dest: /etc/nginx/sites-available/stocksnap
        content: |
          server {
              listen 80;

              server_name _;

              root /var/www/stocksnap;

              index index.html;

              location / {
                  try_files $uri $uri/ /index.html;
              }
          }

    - name: Enable StockSnap site
      file:
        src: /etc/nginx/sites-available/stocksnap
        dest: /etc/nginx/sites-enabled/stocksnap
        state: link

    - name: Test nginx configuration
      command: nginx -t

    - name: Restart nginx
      service:
        name: nginx
        state: restarted